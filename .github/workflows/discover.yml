name: Discover forks

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Discover forks
        id: discover
        env:
          GH_TOKEN: ${{ secrets.FORKLIFT_TOKEN }}
        run: |
          set +e
          ./discover.sh --config repos.json -o repos.json
          code=$?
          if [[ "$code" -eq 2 ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$code" -ne 0 ]]; then
            echo "discover.sh failed with exit code $code" >&2
            exit "$code"
          fi
          echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.discover.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update fork list"
          title: "chore: update fork list"
          body: |
            Automated fork discovery found changes to `repos.json`.

            Review this PR before merging. Add forks to `ignore` if you do not want them synced.
          branch: forklift/discover
          delete-branch: true
